<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合收益计算器</title>
    <style>
        :root {
            --primary: #2c5282;
            --primary-light: #3182ce;
            --secondary: #dd6b20;
            --bg-light: #f7fafc;
            --bg-white: #ffffff;
            --text-dark: #1a202c;
            --text-gray: #4a5568;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: var(--bg-light);
            padding: 15px;
            min-height: 100vh;
            font-size: 16px; /* 基础字体放大，适配手机 */
        }

        .calculator {
            max-width: 100%; /* 手机端占满宽度 */
            width: 100%;
            background: var(--bg-white);
            padding: 30px 20px; /* 减少左右内边距，适配手机 */
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .calculator::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 24px; /* 标题字体放大 */
            font-weight: 600;
            position: relative;
            padding-bottom: 15px;
        }

        h1::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--primary-light);
            border-radius: 3px;
        }

        .form-container {
            transition: all 0.5s ease;
        }

        .form-container.collapsed {
            max-height: 0;
            overflow: hidden;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-gray);
            font-weight: 500;
            font-size: 18px; /* 标签字体放大 */
        }

        input, select {
            width: 100%;
            padding: 16px 15px; /* 输入框内边距加大，点击更友好 */
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 18px; /* 输入框字体放大 */
            color: var(--text-dark);
            transition: all 0.3s ease;
            background-color: var(--bg-white);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }

        input::placeholder {
            color: var(--text-light);
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 18px; /* 按钮内边距加大 */
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 20px; /* 按钮字体放大 */
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(49, 130, 206, 0.05);
            border-radius: 12px;
            display: none;
            border: 1px solid rgba(49, 130, 206, 0.1);
        }

        .result h2 {
            font-size: 22px; /* 结果标题放大 */
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(49, 130, 206, 0.15);
            font-weight: 600;
        }

        .input-summary {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .input-summary h3 {
            font-size: 18px; /* 输入信息标题放大 */
            color: var(--text-gray);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 18px; /* 输入反显字体放大 */
        }

        .input-label {
            color: var(--text-light);
        }

        .input-value {
            color: var(--text-dark);
            font-weight: 600;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr; /* 手机端单列布局更友好 */
            gap: 15px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
        }

        .result-label {
            color: var(--text-light);
            font-size: 18px; /* 结果标签字体放大 */
            margin-bottom: 5px;
        }

        .result-value {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 20px; /* 结果数值字体放大 */
        }

        .total-container {
            grid-column: 1 / -1;
            padding-top: 15px;
            border-top: 1px solid rgba(49, 130, 206, 0.1);
            margin-top: 10px;
            display: flex;
            flex-direction: column; /* 手机端总收益和利率上下排列 */
            gap: 15px;
            align-items: flex-start;
        }

        .total-item {
            width: 100%;
        }

        .highlight {
            color: var(--secondary);
            font-size: 22px; /* 高亮数值进一步放大 */
            font-weight: 700;
        }

        .back-btn {
            background: linear-gradient(135deg, #718096, #4a5568);
            margin-top: 20px;
            display: none;
        }

        /* 免责声明样式 */
        .disclaimer {
            margin-top: 25px;
            text-align: center;
            font-size: 16px; /* 免责声明字体放大 */
            color: var(--text-light);
            padding: 10px 0;
        }

        /* 响应式适配 - 仅针对大屏手机/平板微调 */
        @media (min-width: 768px) {
            .calculator {
                max-width: 600px;
                padding: 40px;
            }
            .result-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
            .total-container {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .total-item {
                text-align: center;
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>综合收益计算器</h1>
        
        <div class="form-container" id="formContainer">
            <div class="form-group">
                <label for="amount">存款金额（元）</label>
                <input type="number" id="amount" placeholder="请输入存款金额，例如：100000" min="10000" required>
            </div>
            
            <div class="form-group">
                <label for="period">存款期限</label>
                <select id="period" required>
                    <option value="1">一年期</option>
                    <option value="2">二年期</option>
                    <option value="3">三年期</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="customerLevel">客户级别</label>
                <select id="customerLevel" required>
                    <option value="normal">普通客户</option>
                    <option value="vip">贵宾客户</option>
                    <option value="gold">黄金客户</option>
                    <option value="platinum">白金客户</option>
                    <option value="diamond">钻石客户</option>
                    <option value="private">私行客户</option>
                </select>
            </div>
            
            <button id="calculateBtn">计算综合收益</button>
        </div>
        
        <div class="result" id="result">
            <h2>计算结果</h2>
            
            <!-- 输入内容反显区域 -->
            <div class="input-summary" id="inputSummary">
                <h3>输入信息</h3>
                <div class="input-row">
                    <span class="input-label">存款金额：</span>
                    <span class="input-value" id="summaryAmount"></span>
                </div>
                <div class="input-row">
                    <span class="input-label">存款期限：</span>
                    <span class="input-value" id="summaryPeriod"></span>
                </div>
                <div class="input-row">
                    <span class="input-label">客户级别：</span>
                    <span class="input-value" id="summaryLevel"></span>
                </div>
                <div class="input-row">
                    <span class="input-label">原存款利率：</span>
                    <span class="input-value" id="summaryRate"></span>
                </div>
            </div>
            
            <div class="result-grid">
                <div class="result-item">
                    <span class="result-label">存款本金</span>
                    <span class="result-value" id="principal"></span>
                </div>
               <div class="result-item">
                    <span class="result-label">基础利息（元）</span>
                    <span class="result-value" id="baseInterest"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">积分回馈活动（元）</span>
                    <span class="result-value" id="activity1"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">资产提升回馈（元）</span>
                    <span class="result-value" id="activity2"></span>
                </div>
               
                
                <!-- 总收益和综合年利率 -->
                <div class="total-container">
                    <div class="total-item">
                        <span class="result-label">总收益（元）</span>
                        <span class="result-value highlight" id="totalProfit"></span>
                    </div>
                    <div class="total-item">
                        <span class="result-label">综合年利率</span>
                        <span class="result-value highlight" id="totalRate"></span>
                    </div>
                </div>
            </div>
            
            <!-- 返回按钮 -->
            <button class="back-btn" id="backBtn">返回重新计算</button>
            
            <!-- 修正后的免责声明 -->
            <div class="disclaimer">仅限内部使用，结果仅供参考</div>
        </div>
    </div>

    <script>
        // DOM元素
        const calculateBtn = document.getElementById('calculateBtn');
        const backBtn = document.getElementById('backBtn');
        const formContainer = document.getElementById('formContainer');
        const resultContainer = document.getElementById('result');
        
        // 监听计算按钮点击事件
        calculateBtn.addEventListener('click', calculateProfit);
        // 监听返回按钮点击事件
        backBtn.addEventListener('click', resetCalculator);

        // 客户级别配置 - 利率：一年1.4%、二年1.5%、三年1.8%
        const customerConfig = {
            normal: { name: '普通客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            vip: { name: '贵宾客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            gold: { name: '黄金客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            platinum: { name: '白金客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            diamond: { name: '钻石客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            private: { name: '私行客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 }
        };

        // 核心计算函数
        function calculateProfit() {
            // 获取输入值
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const period = parseInt(document.getElementById('period').value);
            const customerLevel = document.getElementById('customerLevel').value;
            const levelName = customerConfig[customerLevel].name;
            
            // 期限名称和对应利率
            let periodName = '';
            let originalRate = 0;
            switch(period) {
                case 1:
                    periodName = '一年期';
                    originalRate = customerConfig[customerLevel].rate1;
                    break;
                case 2:
                    periodName = '二年期';
                    originalRate = customerConfig[customerLevel].rate2;
                    break;
                case 3:
                    periodName = '三年期';
                    originalRate = customerConfig[customerLevel].rate3;
                    break;
            }

            // 验证输入
            if (amount < 10000) {
                alert('存款金额不能低于1万元，请重新输入！');
                return;
            }

            // 折叠表单区域
            formContainer.classList.add('collapsed');
            
            // 反显输入内容
            document.getElementById('summaryAmount').textContent = amount.toLocaleString('zh-CN', {minimumFractionDigits: 2});
            document.getElementById('summaryPeriod').textContent = periodName;
            document.getElementById('summaryLevel').textContent = levelName;
            document.getElementById('summaryRate').textContent = originalRate + '%'; // 显示原存款利率

            // 计算各部分收益
            const activity1Profit = calculateActivity1(amount); // 积分回馈活动收益
            const baseInterest = calculateBaseInterest(amount, period, customerLevel); // 基础利息
            const activity2Profit = calculateActivity2(amount, period, customerLevel); // 资产提升回馈收益
            
            // 总收益和综合利率
            const totalProfit = activity1Profit + baseInterest + activity2Profit;
            const totalRate = (totalProfit / amount / period) * 100; // 年化利率

            // 格式化显示结果
            const formatOptions = { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2,
                useGrouping: true 
            };
            
            document.getElementById('principal').textContent = amount.toLocaleString('zh-CN', formatOptions);
            document.getElementById('activity1').textContent = activity1Profit.toLocaleString('zh-CN', formatOptions);
            document.getElementById('activity2').textContent = activity2Profit.toLocaleString('zh-CN', formatOptions);
            document.getElementById('baseInterest').textContent = baseInterest.toLocaleString('zh-CN', formatOptions);
            document.getElementById('totalProfit').textContent = totalProfit.toLocaleString('zh-CN', formatOptions);
            document.getElementById('totalRate').textContent = totalRate.toFixed(4) + '%';
            
            // 显示结果区域和返回按钮
            resultContainer.style.display = 'block';
            backBtn.style.display = 'block';
            
            // 平滑滚动到结果区域
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * 重置计算器（返回重新计算）
         */
        function resetCalculator() {
            // 展开表单区域
            formContainer.classList.remove('collapsed');
            // 隐藏结果区域和返回按钮
            resultContainer.style.display = 'none';
            backBtn.style.display = 'none';
            // 滚动到表单顶部
            formContainer.scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * 计算积分回馈活动收益（秦贝转换为元）
         * @param {number} amount 存款金额（元）
         * @returns {number} 积分回馈总收益（元）
         */
        function calculateActivity1(amount) {
            const tenThousand = amount / 10000;
            let qinbeiPerWan = 0;

            // 根据档位确定每万元回馈秦贝数
            if (amount >= 10000 && amount < 50000) {
                qinbeiPerWan = 1080;
            } else if (amount >= 50000 && amount < 200000) {
                qinbeiPerWan = 1440;
            } else if (amount >= 200000 && amount < 500000) {
                qinbeiPerWan = 1620;
            } else if (amount >= 500000) {
                qinbeiPerWan = 1800;
            }

            // 总秦贝数转换为元（100秦贝=1元）
            const totalQinbei = tenThousand * qinbeiPerWan;
            return totalQinbei / 100;
        }

        /**
         * 计算基础利息
         * @param {number} amount 存款金额（元）
         * @param {number} period 期限（1/2/3年）
         * @param {string} level 客户级别
         * @returns {number} 基础利息（元）
         */
        function calculateBaseInterest(amount, period, level) {
            let rate = 0;
            switch(period) {
                case 1:
                    rate = customerConfig[level].rate1 / 100; // 一年期1.4%
                    break;
                case 2:
                    rate = customerConfig[level].rate2 / 100; // 二年期1.5%
                    break;
                case 3:
                    rate = customerConfig[level].rate3 / 100; // 三年期1.8%
                    break;
            }
            return amount * rate * period;
        }

        /**
         * 计算资产提升回馈收益（修复三年期逻辑：仅单笔>200万才有返现）
         * @param {number} amount 存款金额（元）
         * @param {number} period 期限（1/2/3年）
         * @param {string} level 客户级别
         * @returns {number} 资产提升回馈总收益（元）
         */
        function calculateActivity2(amount, period, level) {
            const tenThousand = amount / 10000;
            let rewardPerWan = 0;

            // 不同客户级别和期限的回馈规则
            switch(level) {
                case 'normal':
                    if (period === 1) { // 普通客户仅一年期返现
                        if (amount >= 100000 && amount < 500000) rewardPerWan = 20;
                        else if (amount >= 500000 && amount < 3000000) rewardPerWan = 35;
                        else if (amount >= 3000000) rewardPerWan = 40;
                    }
                    // 普通客户二年/三年期不返现
                    break;
                case 'vip':
                    if (period === 1) {
                        rewardPerWan = 25;
                    } else if (period === 2) {
                        rewardPerWan = 22;
                    } else if (period === 3 && amount > 2000000) { // 三年期仅>200万返现
                        rewardPerWan = 20;
                    }
                    break;
                case 'gold':
                    if (period === 1) {
                        rewardPerWan = 30;
                    } else if (period === 2) {
                        rewardPerWan = 27;
                    } else if (period === 3 && amount > 2000000) { // 三年期仅>200万返现
                        rewardPerWan = 25;
                    }
                    break;
                // 白金、钻石、私行统一规则
                case 'platinum':
                case 'diamond':
                case 'private':
                    if (period === 1) {
                        rewardPerWan = 35;
                    } else if (period === 2) {
                        rewardPerWan = 25;
                    } else if (period === 3 && amount > 2000000) { // 三年期仅>200万返现
                        rewardPerWan = (amount >= 2000000 && amount < 3000000) ? 15 : (amount >= 3000000) ? 30 : 0;
                    }
                    break;
            }

            return tenThousand * rewardPerWan;
        }

        // 支持回车键触发计算
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !formContainer.classList.contains('collapsed')) {
                calculateProfit();
            }
        });
    </script>
</body>
</html>
